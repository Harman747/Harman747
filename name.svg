<svg width="800" height="90" viewBox="0 0 800 90" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Blue -> Cyan -> Purple -->
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="50%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#A371F7"/>
    </linearGradient>

    <!-- Moving highlight -->
    <linearGradient id="shine" x1="-100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="45%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0">

        <animate
          attributeName="x1"
          from="-100%"
          to="200%"
          dur="3s"
          repeatCount="indefinite"/>

      </stop>
    </linearGradient>

    <!-- Text -->
    <mask id="text-mask">
      <rect width="100%" height="100%" fill="black"/>
      <text
        x="50%"
        y="58%"
        text-anchor="middle"
        font-family="Poppins,Segoe UI,Arial,sans-serif"
        font-size="46"
        font-weight="700"
        fill="white">
        Harman Saini
      </text>
    </mask>

  </defs>

  <!-- Base gradient -->
  <rect
    width="100%"
    height="100%"
    fill="url(#gradient)"
    mask="url(#text-mask)"/>

  <!-- Shimmer -->
  <rect
    width="100%"
    height="100%"
    fill="url(#shine)"
    mask="url(#text-mask)"/>

</svg>
